<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pulse {
      animation: breathe 3s ease-in-out infinite;
    }
    .orbit {
      animation: circulation 6s linear infinite;
      transform-origin: 16px 16px;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes circulation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <g stroke="#8BA7B3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" vector-effect="non-scaling-stroke">
    <path d="M6 6 L12 12" />
    <path d="M26 26 L20 20" />
    <path d="M26 6 L20 12" />
    <path d="M6 26 L12 20" />
  </g>
  
  <!-- Active Pulse Core -->
  <g class="pulse" stroke="#CBEEF3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
    <path d="M12 12 L13 13" />
    <path d="M20 20 L19 19" />
    <path d="M20 12 L19 13" />
    <path d="M12 20 L13 19" />
  </g>

  <!-- Intelligent Operational Circulation -->
  <circle class="orbit" cx="16" cy="16" r="8" stroke="#CBEEF3" stroke-width="1" stroke-dasharray="2 18" stroke-linecap="round" opacity="0.4" fill="none" vector-effect="non-scaling-stroke"/>
</svg>
