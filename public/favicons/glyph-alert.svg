<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="compressedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .stress-element {
      animation: alert-sequence 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes alert-sequence {
      0% { opacity: 0; }
      7% { opacity: 1; }
      13% { opacity: 0; }
      21% { opacity: 0; }
      28% { opacity: 1; }
      100% { opacity: 0.8; }
    }
  </style>

  <!-- Base Structural X (Maintains Tactical Steel) -->
  <g stroke="#8BA7B3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" vector-effect="non-scaling-stroke">
    <path d="M6 6 L13 13" />
    <path d="M26 26 L19 19" />
    <path d="M26 6 L19 13" />
    <path d="M6 26 L13 19" />
  </g>

  <!-- Crimson Fracture Overlay (Subtle Asymmetrical Pressure) -->
  <g class="stress-element" stroke="#880D1E" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
    <path d="M13 13 L14 14" />
    <path d="M19 19 L18 18" />
    <path d="M19 13 L17.5 14.5" />
    <path d="M13 19 L14.2 17.8" />
  </g>

  <!-- Compressed Edge Stress -->
  <g class="stress-element" stroke="#880D1E" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#compressedGlow)" vector-effect="non-scaling-stroke">
    <path d="M5 5 L5.5 5.5" />
    <path d="M27 27 L26.5 26.5" />
    <path d="M27 5 L26.5 5.5" />
    <path d="M5 27 L5.5 26.5" />
  </g>
</svg>
