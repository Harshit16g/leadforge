<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .orchestrate-fast {
      animation: orchestrate-forward 2.5s steps(20) infinite;
      transform-origin: 16px 16px;
    }
    .orchestrate-slow {
      animation: orchestrate-reverse 4s steps(32) infinite reverse;
      transform-origin: 16px 16px;
    }
    @keyframes orchestrate-forward {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes orchestrate-reverse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Base Structural X -->
  <g stroke="#8BA7B3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" vector-effect="non-scaling-stroke">
    <path d="M6 6 L13 13" />
    <path d="M26 26 L19 19" />
    <path d="M26 6 L19 13" />
    <path d="M6 26 L13 19" />
  </g>

  <!-- Orchestration Orbit 1 (Asymmetrical dash array) -->
  <circle class="orchestrate-fast" cx="16" cy="16" r="10" stroke="#CBEEF3" stroke-width="1.2" stroke-dasharray="3 16 5 20 2 24" stroke-linecap="round" opacity="0.7" fill="none" vector-effect="non-scaling-stroke"/>
  
  <!-- Orchestration Orbit 2 (Counter) -->
  <circle class="orchestrate-slow" cx="16" cy="16" r="6" stroke="#CBEEF3" stroke-width="1" stroke-dasharray="2 12 3 14" stroke-linecap="round" opacity="0.5" fill="none" vector-effect="non-scaling-stroke"/>
</svg>
